<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:insert="fragments/head :: head('Create To Do')"></div>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center">Create Todo</h1>
    <form th:action="@{/todos/save}" th:object="${todo}" method="post" class="mt-4">
        <!-- Title Field -->
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" name="title" th:field="*{title}" class="form-control" required>
        </div>
        <!-- Description Field -->
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" th:field="*{description}" class="form-control"></textarea>
        </div>
        <!-- Completed Checkbox -->
        <div class="mb-3 form-check">
            <input type="checkbox" id="complete" name="complete" th:field="*{complete}" class="form-check-input">
            <label for="complete" class="form-check-label">Completed</label>
        </div>
        <!-- Submit and Cancel Buttons -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/todos" class="btn btn-secondary d-inline">Cancel</a>
        </div>
    </form>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
